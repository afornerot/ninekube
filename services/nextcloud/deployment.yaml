apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  namespace: nine
  labels:
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/part-of: ninekube
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nextcloud
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nextcloud
        app.kubernetes.io/part-of: ninekube
    spec:
      containers:
        - name: nextcloud
          image: nextcloud:stable
          ports:
            - containerPort: 80
              name: http
          env:
            - name: POSTGRES_HOST
              value: "dev-postgres"
            - name: POSTGRES_DB
              value: "nextcloud"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: dev-postgres-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dev-postgres-secret
                  key: password
            - name: REDIS_HOST
              value: "dev-redis"
            - name: NEXTCLOUD_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: dev-nine-secrets
                  key: admin_username
                  optional: true
            - name: NEXTCLOUD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dev-nine-secrets
                  key: admin_password
                  optional: true
            - name: NEXTCLOUD_TRUSTED_DOMAINS
              value: "cloud.nine.local"
          volumeMounts:
            - name: data
              mountPath: /var/www/html
            - name: config
              mountPath: /usr/local/etc/php/conf.d/zzz-custom.ini
              subPath: zzz-custom.ini
          livenessProbe:
            exec:
              command:
                - curl
                - -f
                - http://localhost/
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - curl
                - -f
                - http://localhost/
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nextcloud-data
        - name: config
          configMap:
            name: nextcloud-config
