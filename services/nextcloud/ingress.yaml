apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextcloud
  namespace: nine
  labels:
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/part-of: ninekube
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-issuer
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - nextcloud.nine.local
      secretName: nextcloud-tls
  rules:
    - host: nextcloud.nine.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port:
                  number: 80
