apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinyfilemanager
  namespace: nine
  labels:
    app.kubernetes.io/name: tinyfilemanager
    app.kubernetes.io/part-of: ninekube
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tinyfilemanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tinyfilemanager
        app.kubernetes.io/part-of: ninekube
    spec:
      containers:
        - name: tinyfilemanager
          image: tinyfilemanager/tinyfilemanager:latest
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /var/www/html/data
            - name: config
              mountPath: /var/www/html/index.php
              subPath: index.php
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tinyfilemanager-data
        - name: config
          configMap:
            name: tinyfilemanager-config
