version: "3"

tasks:
  default:
    silent: true
    cmds:
      - task --list

  setup:
    desc: Full cluster setup (install + deploy + configure)
    silent: true
    vars:
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - bash task/setup.sh {{.ENV}}

  install:
    desc: Install prerequisites (curl, kubectl, k3s, k9s, task)
    silent: true
    cmds:
      - bash task/install.sh

  uninstall:
    desc: Uninstall k3s cluster
    silent: true
    cmds:
      - bash task/uninstall.sh

  config-set:
    desc: Configure secrets and kubeconfig
    silent: true
    cmds:
      - bash task/config-set.sh

  deploy:
    desc: Deploy dev overlay via kustomize
    silent: true
    vars:
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - bash task/deploy.sh {{.ENV}}

  service-predeploy:
    desc: Pre-deploy a service (namespaces, secrets, configmaps)
    silent: true
    vars:
      SERVICE: '{{.SERVICE}}'
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - bash task/predeploy-{{.SERVICE}}.sh {{.ENV}}

  service-postdeploy:
    desc: Post-deploy a service (DNS, OIDC, ingress, etc.)
    silent: true
    vars:
      SERVICE: '{{.SERVICE}}'
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - bash task/postdeploy-{{.SERVICE}}.sh {{.ENV}}

  service-deploy:
    desc: Full deploy pipeline for a service (predeploy + deploy + postdeploy)
    silent: true
    vars:
      SERVICE: '{{.SERVICE}}'
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - bash task/service-deploy.sh {{.SERVICE}} {{.ENV}}

  service-list:
    desc: List available services and their status
    silent: true
    cmds:
      - bash task/service-list.sh

  build:
    desc: Build and push custom Docker image for a service
    silent: true
    vars:
      SERVICE: '{{.SERVICE}}'
    cmds:
      - bash task/build-${SERVICE}.sh

  service-enable:
    desc: Enable a service (symlink + kustomize)
    silent: true
    vars:
      SERVICE: '{{.SERVICE}}'
    cmds:
      - bash task/service-enable.sh {{.SERVICE}}

  service-disable:
    desc: Disable a service
    silent: true
    vars:
      SERVICE: '{{.SERVICE}}'
    cmds:
      - bash task/service-disable.sh {{.SERVICE}}

  delete-dev:
    desc: Delete dev overlay
    silent: true
    cmds:
      - bash task/delete.sh dev

  delete-prod:
    desc: Delete prod overlay
    silent: true
    cmds:
      - bash task/delete.sh prod

  status:
    desc: Show cluster status
    silent: true
    cmds:
      - bash task/status.sh

  logs:
    desc: Show pod logs
    silent: true
    cmds:
      - bash task/logs.sh

  backup:
    desc: Backup PVC data and/or databases for a service (or all)
    silent: true
    vars:
      SERVICE: '{{.SERVICE | default ""}}'
      BACKUP_PVC: '{{.BACKUP_PVC | default ""}}'
      BACKUP_DB: '{{.BACKUP_DB | default ""}}'
    cmds:
      - BACKUP_PVC="{{.BACKUP_PVC}}" BACKUP_DB="{{.BACKUP_DB}}" bash task/backup.sh {{.SERVICE}}

  restore:
    desc: Restore PVC data and/or databases for a service (or all)
    silent: true
    vars:
      SERVICE: '{{.SERVICE | default ""}}'
    cmds:
      - bash task/restore.sh {{.SERVICE}}
