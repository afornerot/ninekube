version: "3"

tasks:
  default:
    silent: true
    cmds:
      - task --list

  setup:
    desc: Full cluster setup (install + deploy + configure)
    silent: true
    vars:
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - bash task/setup.sh {{.ENV}}

  install:
    desc: Install prerequisites (curl, kubectl, k3s, k9s, task)
    silent: true
    cmds:
      - bash task/install.sh

  uninstall:
    desc: Uninstall k3s cluster
    silent: true
    cmds:
      - bash task/uninstall.sh

  apply-config:
    desc: Configure secrets and kubeconfig
    silent: true
    cmds:
      - bash task/apply-config.sh

  apply-secrets:
    desc: Apply secrets to the cluster
    silent: true
    vars:
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - bash task/apply-secrets.sh {{.ENV}}

  apply-cert:
    desc: Setup TLS certificates
    silent: true
    vars:
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - bash task/apply-cert.sh {{.ENV}}

  apply-authentik:
    desc: Configure Authentik (LDAP, admin, outpost)
    silent: true
    cmds:
      - bash task/apply-authentik.sh

  apply-minio:
    desc: Create/update MinIO admin user via mc
    silent: true
    vars:
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - bash task/apply-minio.sh {{.ENV}}

  deploy-dev:
    desc: Deploy dev overlay
    silent: true
    cmds:
      - bash task/deploy.sh dev

  deploy-prod:
    desc: Deploy prod overlay
    silent: true
    cmds:
      - bash task/deploy.sh prod

  delete-dev:
    desc: Delete dev overlay
    silent: true
    cmds:
      - bash task/delete.sh dev

  delete-prod:
    desc: Delete prod overlay
    silent: true
    cmds:
      - bash task/delete.sh prod

  status:
    desc: Show cluster status
    silent: true
    cmds:
      - bash task/status.sh

  logs:
    desc: Show pod logs
    silent: true
    cmds:
      - bash task/logs.sh

  service-list:
    desc: List available services and their status
    silent: true
    cmds:
      - bash task/service-list.sh

  service-enable:
    desc: Enable a service (symlink + kustomize)
    silent: true
    vars:
      SERVICE: '{{.SERVICE}}'
    cmds:
      - bash task/service-enable.sh {{.SERVICE}}

  service-deploy:
    desc: Deploy a service (kustomize + apply)
    silent: true
    vars:
      SERVICE: '{{.SERVICE}}'
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - bash task/service-deploy.sh {{.SERVICE}} {{.ENV}}

  service-disable:
    desc: Disable a service
    silent: true
    vars:
      SERVICE: '{{.SERVICE}}'
    cmds:
      - bash task/service-disable.sh {{.SERVICE}}

  service-apply:
    desc: Run apply script for a service
    silent: true
    vars:
      SERVICE: '{{.SERVICE}}'
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - bash task/apply-{{.SERVICE}}.sh {{.ENV}}

  backup:
    desc: Backup PVC data and/or databases for a service (or all)
    silent: true
    vars:
      SERVICE: '{{.SERVICE | default ""}}'
      BACKUP_PVC: '{{.BACKUP_PVC | default ""}}'
      BACKUP_DB: '{{.BACKUP_DB | default ""}}'
    cmds:
      - BACKUP_PVC="{{.BACKUP_PVC}}" BACKUP_DB="{{.BACKUP_DB}}" bash task/backup.sh {{.SERVICE}}

  restore:
    desc: Restore PVC data and/or databases for a service (or all)
    silent: true
    vars:
      SERVICE: '{{.SERVICE | default ""}}'
    cmds:
      - bash task/restore.sh {{.SERVICE}}
