apiVersion: apps/v1
kind: Deployment
metadata:
  name: glauth
  namespace: nine
  labels:
    app.kubernetes.io/name: glauth
    app.kubernetes.io/part-of: ninekube
    app.kubernetes.io/component: ninegate
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: glauth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glauth
        app.kubernetes.io/part-of: ninekube
        app.kubernetes.io/component: ninegate
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "waiting for postgres..."
                sleep 2
              done
        - name: wait-ninegate
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O- --spider http://ninegate:80/ 2>/dev/null; do
                echo "waiting for ninegate..."
                sleep 3
              done
      containers:
        - name: glauth
          image: ghcr.io/glauth/glauth-plugins:v2.4.0
          ports:
            - name: ldap
              containerPort: 3893
            - name: ldaps
              containerPort: 636
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: tls
              mountPath: /etc/glauth/tls
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: ldap
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: ldap
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: ninegate-glauth-config
        - name: tls
          secret:
            secretName: glauth-tls
