apiVersion: apps/v1
kind: Deployment
metadata:
  name: ninegate
  namespace: nine
  labels:
    app.kubernetes.io/name: ninegate
    app.kubernetes.io/part-of: ninekube
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ninegate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ninegate
        app.kubernetes.io/part-of: ninekube
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "waiting for postgres..."
                sleep 2
              done
      containers:
        - name: ninegate
          image: ghcr.io/afornerot/ninegate:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          env:
            - name: APP_ENV
              value: "prod"
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: ninegate-secret
                  key: app-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ninegate-secret
                  key: database-url
            - name: DEFAULT_URI
              valueFrom:
                secretKeyRef:
                  name: ninegate-secret
                  key: default-uri
            - name: APP_MODEAUTH
              value: "OIDC"
            - name: APP_MASTERIDENTITY
              value: "SQL"
            - name: MAILER_DSN
              value: "smtp://mailhog:1025"
            - name: LDAP_BASE
              valueFrom:
                secretKeyRef:
                  name: ninegate-secret
                  key: ldap-base
            - name: OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: ninegate-secret
                  key: oidc-issuer
            - name: OIDC_CLIENTID
              value: "ninegate"
            - name: OIDC_CLIENTSECRET
              valueFrom:
                secretKeyRef:
                  name: ninegate-secret
                  key: oidc-client-secret
            - name: OIDC_REDIRECTURI
              valueFrom:
                secretKeyRef:
                  name: ninegate-secret
                  key: oidc-redirect-uri
            - name: APP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ninegate-secret
                  key: app-admin-password
            - name: OIDC_MAILATTRIBUTE
              value: "email"
            - name: OIDC_USERNAMEATTRIBUTE
              value: "name"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: public-uploads
              mountPath: /app/public/uploads
            - name: glauth-config
              mountPath: /app/volume/glauth
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: ninegate-uploads
        - name: public-uploads
          persistentVolumeClaim:
            claimName: ninegate-public-uploads
        - name: glauth-config
          configMap:
            name: ninegate-glauth-config
