apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex
  namespace: nine
  labels:
    app.kubernetes.io/name: dex
    app.kubernetes.io/part-of: ninekube
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dex
        app.kubernetes.io/part-of: ninekube
    spec:
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:v2.41.1
          command:
            - dex
            - serve
            - /etc/dex/config.yaml
          ports:
            - name: https
              containerPort: 5556
            - name: grpc
              containerPort: 5557
          volumeMounts:
            - name: config
              mountPath: /etc/dex/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: tls
              mountPath: /etc/dex/tls
              readOnly: true
            - name: data
              mountPath: /var/dex
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: config
          secret:
            secretName: dex-config
        - name: tls
          secret:
            secretName: dex-tls
        - name: data
          emptyDir: {}
