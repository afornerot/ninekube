apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
  namespace: nine
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: ninekube
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: authentik
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authentik
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: ninekube
    spec:
      containers:
        - name: authentik-worker
          image: ghcr.io/goauthentik/server:2026.5.2
          command: ['ak', 'worker']
          envFrom:
            - configMapRef:
                name: authentik-config
            - secretRef:
                name: authentik-secret
          volumeMounts:
            - name: media
              mountPath: /media
            - name: blueprints
              mountPath: /blueprints/custom
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: media
          emptyDir: {}
        - name: blueprints
          configMap:
            name: ninekube-authentik-blueprint
