apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  namespace: nine
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: ninekube
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: authentik
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authentik
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: ninekube
    spec:
      containers:
        - name: authentik-server
          image: ghcr.io/goauthentik/server:2026.5.2
          command: ['ak', 'server']
          ports:
            - name: http
              containerPort: 9000
            - name: https
              containerPort: 9443
          envFrom:
            - configMapRef:
                name: authentik-config
            - secretRef:
                name: authentik-secret
          volumeMounts:
            - name: media
              mountPath: /media
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /-/health/ready/
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /-/health/ready/
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: media
          emptyDir: {}
