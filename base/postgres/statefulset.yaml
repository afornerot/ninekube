apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: nine
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: ninekube
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: ninekube
    spec:
      containers:
        - name: postgres
          image: postgres:16
          command:
            - /bin/bash
            - -c
            - |
              # Start PostgreSQL in background
              docker-entrypoint.sh postgres &
              PG_PID=$!

              # Wait for PostgreSQL to be ready
              until pg_isready -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" > /dev/null 2>&1; do
                sleep 1
              done

              # Update password if user already exists (handles password changes)
              psql -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -tc \
                "SELECT 1 FROM pg_roles WHERE rolname='${POSTGRES_USER}'" | grep -q 1 && \
                psql -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -c \
                "ALTER USER ${POSTGRES_USER} WITH PASSWORD '${POSTGRES_PASSWORD}';"

              wait $PG_PID
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: ninekube
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - ninekube
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - ninekube
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: postgres
          app.kubernetes.io/part-of: ninekube
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
